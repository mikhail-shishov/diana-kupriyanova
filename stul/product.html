    <style>
        .product-page {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        .breadcrumbs {
            margin-bottom: 40px;
            color: #666;
            font-size: 14px;
        }

        .breadcrumbs a {
            color: #666;
            text-decoration: none;
            transition: color 0.3s;
        }

        .breadcrumbs a:hover {
            color: #000;
        }

        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            margin-bottom: 80px;
        }

        .product-gallery {
            position: relative;
        }

        .main-image-container {
            background: #f8f8f8;
            padding: 40px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
        }

        .main-image {
            max-width: 100%;
            max-height: 450px;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .thumbnail-gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .thumbnail-item {
            background: #f8f8f8;
            padding: 10px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .thumbnail-item:hover,
        .thumbnail-item.active {
            opacity: 1;
        }

        .thumbnail-item img {
            max-width: 100%;
            max-height: 70px;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .product-info {
            padding: 20px 0;
        }

        .product-info h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .product-info .price {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .product-info .badge {
            display: inline-block;
            background: #e9eae5;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .product-description {
            margin: 30px 0;
            line-height: 1.8;
            color: #444;
        }

        .product-actions {
            display: flex;
            gap: 20px;
            margin: 40px 0;
        }

        .add-to-cart {
            flex: 2;
            background: #000;
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .add-to-cart:hover {
            background: #333;
            transform: scale(1.02);
        }

        .add-to-favorites {
            flex: 1;
            background: #fff;
            border: 2px solid #000;
            color: #000;
            padding: 15px;
            border-radius: 40px;
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .add-to-favorites:hover {
            background: #000;
            color: #fff;
        }

        .add-to-favorites.active {
            background: #000;
            color: #fff;
        }

        .product-specs {
            margin-top: 40px;
            border-top: 1px solid #ddd;
            padding-top: 40px;
        }

        .product-specs h3 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .spec-item {
            display: flex;
            gap: 10px;
        }

        .spec-label {
            font-weight: 600;
            min-width: 100px;
        }

        .spec-value {
            color: #666;
        }

        .related-products {
            margin-top: 80px;
        }

        .related-products h2 {
            font-size: 36px;
            margin-bottom: 40px;
            text-align: center;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .notification {
            position: fixed;
            top: 100px;
            right: 40px;
            background: #000;
            color: #fff;
            padding: 15px 30px;
            border-radius: 40px;
            z-index: 2000;
            transform: translateX(400px);
            transition: transform 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .notification.show {
            transform: translateX(0);
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: #fff;
            box-shadow: -5px 0 20px rgba(0,0,0,0.1);
            z-index: 3000;
            transition: right 0.3s;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            padding: 25px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h3 {
            font-size: 18px;
        }

        .close-cart {
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .close-cart:hover {
            color: #f00;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
            position: relative;
        }

        .cart-item img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-info h4 {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .cart-item-price {
            font-weight: 600;
            color: #000;
            font-size: 14px;
        }

        .cart-item-remove {
            position: absolute;
            top: 0;
            right: 0;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .cart-item-remove:hover {
            color: #f00;
        }

        .cart-footer {
            padding: 25px;
            border-top: 1px solid #ddd;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 16px;
            font-weight: 600;
        }

        .checkout-btn {
            width: 100%;
            background: #000;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .checkout-btn:hover {
            background: #333;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #000;
            color: #fff;
            font-size: 10px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .basket-icon {
            position: relative;
            cursor: pointer;
        }

        @media (max-width: 1200px) {
            .related-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 992px) {
            .product-container {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            
            .related-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .product-page {
                padding: 20px;
            }
            
            .product-info h1 {
                font-size: 36px;
            }
            
            .product-info .price {
                font-size: 28px;
            }
            
            .product-actions {
                flex-direction: column;
            }
            
            .related-grid {
                grid-template-columns: 1fr;
            }
            
            .cart-sidebar {

                right: -100%;

            .specs-grid {
                grid-template-columns: 1fr;
            }

                </div>
            </form>

        function getProductId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        function displayProduct() {
            const productId = getProductId();
            
            if (!productId || !productsData[productId]) {
                document.getElementById('productPage').innerHTML = `
                    <div style="text-align: center; padding: 100px 20px;">
                        <h2>Товар не найден</h2>
                        <p style="margin: 20px 0;">К сожалению, запрошенный товар отсутствует.</p>
                        <a href="catalog.html" class="hits-btn" style="display: inline-block; background: #000; color: #fff; padding: 12px 35px; border-radius: 40px; text-decoration: none;">Вернуться в каталог</a>
                    </div>
                `;
                return;
            }

            const product = productsData[productId];
            const isFavorite = favorites.some(fav => fav.id === product.id);
            
            let seriesLink = '';
            if (product.series === 'Бестселлеры') {
                seriesLink = `<a href="index.php#bestsellers">${product.series}</a>`;
            } else {
                seriesLink = `<a href="series.html?name=${product.series}">${product.series}</a>`;
            }
            
            const html = `
                <div class="breadcrumbs">
                    <a href="index.php">Главная</a> /
                    <a href="catalog.html">Каталог</a> / 
                    ${seriesLink} / 
                    <span>${product.name}</span>
                </div>

                <div class="product-container">
                    <div class="product-gallery">
                        <div class="main-image-container">
                            <img src="${product.mainImage}" alt="${product.name}" class="main-image" id="mainImage">
                        </div>
                        <div class="thumbnail-gallery">
                            ${product.images.map((img, index) => `
                                <div class="thumbnail-item ${index === 0 ? 'active' : ''}" onclick="changeImage('${img}')">
                                    <img src="${img}" alt="${product.name} вид ${index + 1}">
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="product-info">
                        ${product.badge ? `<span class="badge">${product.badge}</span>` : ''}
                        <h1>${product.name}</h1>
                        <div class="price">${product.price.toLocaleString()} ₽</div>
                        
                        <div class="product-description">
                            <p>${product.description}</p>
                        </div>

                        <div class="product-actions">
                            <button class="add-to-cart" onclick="addToCart({
                                id: '${product.id}',
                                name: '${product.name}',
                                price: ${product.price},
                                image: '${product.mainImage}'
                            })">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                    <path d="M7 18C5.9 18 5.01 18.9 5.01 20C5.01 21.1 5.9 22 7 22C8.1 22 9 21.1 9 20C9 18.9 8.1 18 7 18ZM1 2V4H3L6.6 11.59L5.25 14.04C5.09 14.32 5 14.65 5 15C5 16.1 5.9 17 7 17H19V15H7.42C7.28 15 7.17 14.89 7.17 14.75L7.2 14.63L8.1 13H15.55C16.3 13 16.96 12.59 17.3 11.97L20.88 5.48C20.96 5.34 21 5.17 21 5C21 4.45 20.55 4 20 4H5.21L4.27 2H1ZM17 18C15.9 18 15.01 18.9 15.01 20C15.01 21.1 15.9 22 17 22C18.1 22 19 21.1 19 20C19 18.9 18.1 18 17 18Z" fill="currentColor"/>
                                </svg>
                                В корзину
                            </button>
                            <button class="add-to-favorites ${isFavorite ? 'active' : ''}" id="favoriteBtn" onclick="toggleFavorite({
                                id: '${product.id}',
                                name: '${product.name}',
                                price: ${product.price},
                                image: '${product.mainImage}'
                            })">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                    <path d="M12 21.35L10.55 20.03C5.4 15.36 2 12.28 2 8.5C2 5.42 4.42 3 7.5 3C9.24 3 10.91 3.81 12 5.09C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.42 22 8.5C22 12.28 18.6 15.36 13.45 20.04L12 21.35Z" fill="currentColor"/>
                                </svg>
                                В избранное
                            </button>
                        </div>

                        <div class="product-specs">
                            <h3>Характеристики</h3>
                            <div class="specs-grid">
                                <div class="spec-item">
                                    <span class="spec-label">Материал:</span>
                                    <span class="spec-value">${product.specs.material}</span>
                                </div>
                                <div class="spec-item">
                                    <span class="spec-label">Цвет:</span>
                                    <span class="spec-value">${product.specs.color}</span>
                                </div>
                                <div class="spec-item">
                                    <span class="spec-label">Размеры:</span>

                                </div>
                                <div class="spec-item">
                                    <span class="spec-label">Вес:</span>
                                    <span class="spec-value">${product.specs.weight}</span>
                                </div>
                                <div class="spec-item">
                                    <span class="spec-label">Страна:</span>
                                    <span class="spec-value">${product.specs.country}</span>
                                </div>
                                <div class="spec-item">
                                    <span class="spec-label">Гарантия:</span>

                                </div>

                        </div>
                    </div>
                </div>

                <div class="related-products">
                    <h2>Вам также может понравиться</h2>
                    <div class="related-grid">
                        <div class="product-card" onclick="location.href='product.html?id=blossom8'">

                        </div>

                            <p class="price">890 120 ₽</p>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('productPage').innerHTML = html;
        }

        window.changeImage = function(src) {
            document.getElementById('mainImage').src = src;
            document.querySelectorAll('.thumbnail-item').forEach(item => {
                item.classList.remove('active');
                if (item.querySelector('img').src === src) {
                    item.classList.add('active');
                }
            });
        };

        window.toggleFavorite = function(product) {
            const index = favorites.findIndex(fav => fav.id === product.id);
            
            if (index === -1) {
                favorites.push(product);
                document.getElementById('favoriteBtn')?.classList.add('active');
                showNotification('Добавлено в избранное');
            } else {
                favorites.splice(index, 1);
                document.getElementById('favoriteBtn')?.classList.remove('active');
                showNotification('Удалено из избранного');
            }
            
            localStorage.setItem('favorites', JSON.stringify(favorites));
        };

        window.addToCart = function(product) {
            const existingItem = cart.find(item => item.id === product.id);
            
            if (existingItem) {
                existingItem.quantity = (existingItem.quantity || 1) + 1;
            } else {
                cart.push({...product, quantity: 1});
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            updateCartDisplay();
            showNotification('Товар добавлен в корзину');
            openCart();
        };

        window.removeFromCart = function(productId) {
            cart = cart.filter(item => item.id !== productId);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            updateCartDisplay();
            showNotification('Товар удален из корзины');
        };

        window.updateCartCount = function() {
            const cartCount = document.getElementById('cartCount');
            if (cartCount) {
                const count = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
                cartCount.textContent = count;
            }
        };

        window.updateCartDisplay = function() {
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            
            if (!cartItems || !cartTotal) return;
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">Корзина пуста</p>';
                cartTotal.textContent = '0 ₽';
                return;
            }
            
            let html = '';
            let total = 0;
            
            cart.forEach(item => {
                const itemTotal = item.price * (item.quantity || 1);
                total += itemTotal;
                
                html += `
                    <div class="cart-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="cart-item-info">
                            <h4>${item.name}</h4>
                            <div class="cart-item-price">${item.price.toLocaleString()} ₽</div>
                            <div style="font-size: 12px; color: #666;">Количество: ${item.quantity || 1}</div>
                        </div>
                        <button class="cart-item-remove" onclick="removeFromCart('${item.id}')">&times;</button>
                    </div>
                `;
            });
            
            cartItems.innerHTML = html;
            cartTotal.textContent = total.toLocaleString() + ' ₽';
        };

        window.openCart = function() {
            const cartSidebar = document.getElementById('cartSidebar');
            if (cartSidebar) {
                cartSidebar.classList.add('open');
            }
        };

        window.closeCart = function() {
            const cartSidebar = document.getElementById('cartSidebar');
            if (cartSidebar) {
                cartSidebar.classList.remove('open');
            }
        };

        window.showNotification = function(message) {
            const notification = document.createElement('div');
            notification.className = 'notification show';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2000);
        };

        window.checkout = function() {
            alert('Функция оформления заказа будет доступна в ближайшее время');
        };

        document.addEventListener('DOMContentLoaded', function() {
            displayProduct();
            updateCartCount();
            updateCartDisplay();

            const userIcon = document.querySelector('.user-icon');
            const authModal = document.getElementById('authModal');
            const closeBtn = document.querySelector('.close-btn');
            const cartIcon = document.getElementById('cartIcon');
            const favoritesIcon = document.querySelector('.favorites-icon');

            if (userIcon) {
                userIcon.addEventListener('click', function() {
                    authModal.style.display = 'flex';
                });
            }

            if (closeBtn) {
                closeBtn.addEventListener('click', function() {
                    authModal.style.display = 'none';
                });
            }

            if (cartIcon) {
                cartIcon.addEventListener('click', openCart);
            }

            if (favoritesIcon) {
                favoritesIcon.addEventListener('click', function() {
                    window.location.href = 'favorites.html';
                });
            }

            window.addEventListener('click', function(e) {
                if (e.target === authModal) {
                    authModal.style.display = 'none';
                }
            });

            document.querySelectorAll('.register-btn, .login-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    showNotification('Функция будет доступна в ближайшее время');
                });
            });
        });
    </script>
